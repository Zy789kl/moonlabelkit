name: MoonBit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MoonBit Toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check code formatting and syntax
        run: moon check

      - name: Build project (Wasm-GC)
        run: moon build --target wasm-gc

      - name: Run automated unit tests
        run: moon test
