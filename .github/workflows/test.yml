name: MoonLabelKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libssl-dev
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup MoonBit toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc openssl
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup MoonBit toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSYS2 + MinGW + OpenSSL (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openssl

      - name: Moon version
        run: moon version --all

      - name: Install dependencies
        run: |
          moon update
          moon install

      - name: Moon check
        run: moon check --deny-warn

      - name: Moon info
        run: |
          moon info --target all
          git diff --exit-code

      - name: Moon format
        run: |
          moon fmt
          git diff --exit-code

      - name: Moon test
        run: moon test --target all,native

      - name: Moon test release
        run: moon test --target all,native --release
